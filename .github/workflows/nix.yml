name: Update Nix vendorHash

on:
  push:
    paths:
      - 'go.mod'
      - 'go.sum'
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hash:
    name: Compute vendorHash
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Compute vendorHash
        id: hash
        run: |
          # Build will fail with the wrong hash but print the correct one
          HASH=$(nix build .# 2>&1 | grep -oP 'got:\s+\K\S+' || true)
          if [ -z "$HASH" ]; then
            echo "vendorHash is already up to date"
            exit 0
          fi
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
          echo "Computed vendorHash: ${HASH}"

      - name: Update flake.nix and open PR
        if: steps.hash.outputs.hash
        env:
          HASH: ${{ steps.hash.outputs.hash }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i "s|vendorHash = \".*\";|vendorHash = \"${HASH}\";|" flake.nix

          BRANCH="chore/update-vendor-hash"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add flake.nix
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(nix): update vendorHash"
          git push -f origin "${BRANCH}"

          # Create or update PR
          EXISTING=$(gh pr list --head "${BRANCH}" --json number -q '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists"
          else
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(nix): update vendorHash" \
              --body "Auto-generated by the nix workflow after go.mod/go.sum changed."
          fi
