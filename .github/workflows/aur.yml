name: Update AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.7.0)'
        required: true

jobs:
  aur-bin:
    name: Update qml-language-server-bin
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || !github.event.release.prerelease"

    steps:
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ver=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download and checksum
        env:
          VER: ${{ steps.version.outputs.tag }}
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/${VER}"
          # -f fails on HTTP errors (so a 404 doesn't silently write "Not Found" to the file).
          # --retry + --retry-all-errors retries 404s, which handles the race where the release
          # event fires before all matrix jobs in release.yml have uploaded their assets.
          curl -sLOf --retry 30 --retry-delay 10 --retry-all-errors \
            "${BASE}/qml-language-server-${VER}-linux-amd64.zip"
          curl -sLOf --retry 30 --retry-delay 10 --retry-all-errors \
            "${BASE}/qml-language-server-${VER}-linux-arm64.zip"
          sha256sum qml-language-server-*.zip > checksums.txt
          cat checksums.txt
          SHA_AMD64=$(grep amd64 checksums.txt | cut -d' ' -f1)
          SHA_ARM64=$(grep arm64 checksums.txt | cut -d' ' -f1)
          # Defense in depth: distinct arches cannot produce the same hash. If they match,
          # both downloads returned the same body (e.g. an error page) and we must not
          # publish. release.yml should already prevent this by attaching all assets before
          # firing the release event, but refuse to poison the AUR repo if something slips.
          if [[ "${SHA_AMD64}" == "${SHA_ARM64}" ]]; then
            echo "ERROR: amd64 and arm64 sha256 are identical (${SHA_AMD64})" >&2
            echo "Refusing to publish — downloads likely returned the same error body." >&2
            exit 1
          fi
          echo "sha_amd64=${SHA_AMD64}" >> $GITHUB_ENV
          echo "sha_arm64=${SHA_ARM64}" >> $GITHUB_ENV

      - name: Clone AUR repo
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo -e "Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n  StrictHostKeyChecking accept-new" > ~/.ssh/config
          git clone ssh://aur@aur.archlinux.org/qml-language-server-bin.git aur-bin

      - name: Update PKGBUILD
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          cd aur-bin
          cat > PKGBUILD << 'PKGEOF'
          # Maintainer: Matthew Cushing <cushing.matt@gmail.com>
          pkgname=qml-language-server-bin
          pkgver=PLACEHOLDER_VER
          pkgrel=1
          pkgdesc="Language Server Protocol implementation for QML"
          arch=('x86_64' 'aarch64')
          url="https://github.com/cushycush/qml-language-server"
          license=('MIT')
          provides=('qml-language-server')
          conflicts=('qml-language-server' 'qml-language-server-git')

          _base_url="${url}/releases/download/v${pkgver}/qml-language-server-v${pkgver}"

          source_x86_64=("${_base_url}-linux-amd64.zip")
          source_aarch64=("${_base_url}-linux-arm64.zip")

          sha256sums_x86_64=('PLACEHOLDER_AMD64')
          sha256sums_aarch64=('PLACEHOLDER_ARM64')

          package() {
              cd "${srcdir}"
              if [[ "${CARCH}" == "x86_64" ]]; then
                  _bin="qml-language-server-v${pkgver}-linux-amd64"
              else
                  _bin="qml-language-server-v${pkgver}-linux-arm64"
              fi
              install -Dm755 "${_bin}" "${pkgdir}/usr/bin/qml-language-server"
              install -Dm644 <(curl -sL "${url}/raw/v${pkgver}/LICENSE") "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
          }
          PKGEOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' PKGBUILD
          sed -i "s/PLACEHOLDER_VER/${VER}/" PKGBUILD
          sed -i "s/PLACEHOLDER_AMD64/${sha_amd64}/" PKGBUILD
          sed -i "s/PLACEHOLDER_ARM64/${sha_arm64}/" PKGBUILD

          cat PKGBUILD

      - name: Generate .SRCINFO
        uses: docker://archlinux:latest
        with:
          args: bash -c "pacman -Sy --noconfirm pacman-contrib && useradd -m builder && cd /github/workspace/aur-bin && chown builder . && su builder -c 'makepkg --printsrcinfo' > .SRCINFO"

      - name: Push to AUR
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          cd aur-bin
          git config user.name "Matthew Cushing"
          git config user.email "cushing.matt@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update to ${VER}"
          git push
