name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          EXTENSION=""
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
          fi
          NAME="qml-language-server-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}${EXTENSION}"
          go build -ldflags="-s -w" -o "${NAME}" .

      - name: Create ZIP archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          EXTENSION=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXTENSION=".exe"
          fi
          BASE="qml-language-server-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          zip "${BASE}.zip" "${BASE}${EXTENSION}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: qml-language-server-*.zip
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.RELEASE_PAT }}
          files: dist/qml-language-server-*.zip
          draft: false
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
